<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cancel booking — Re-balance</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css?v=106" />
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="index.html">
        <svg class="brand__icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
        <span>Re-balance</span>
      </a>
    </div>
  </header>

  <main class="section">
    <div class="wrap" style="max-width:640px">
      <h1 id="cancel-heading" style="margin:0 0 1rem">Cancel booking</h1>
      <p id="cancel-status" class="muted">…</p>
      <p style="margin-top:1.6rem"><a class="btn btn--solid" href="index.html">← Back to site</a></p>
    </div>
  </main>

  <script src="assets/js/config.js?v=23"></script>
  <script src="assets/js/i18n.js?v=43"></script>
  <script>
    (function () {
      var t = window.t || function (k) { return k; };
      var heading = document.getElementById("cancel-heading");
      var status = document.getElementById("cancel-status");
      heading.textContent = t("cancel_heading");

      var token = new URLSearchParams(location.search).get("token");
      var cfg = (window.SITE_CONFIG && window.SITE_CONFIG.booking) || {};

      var key = cfg.publishableKey || cfg.anonKey || "";
      if (!token) { status.textContent = t("cancel_missing"); return; }
      if (!cfg.functionsBase || !key) { status.textContent = t("cancel_error"); return; }

      status.textContent = t("cancel_checking");
      fetch(String(cfg.functionsBase).replace(/\/+$/, "") + "/cancel-booking", {
        method: "POST",
        headers: { "content-type": "application/json", "apikey": key, "Authorization": "Bearer " + key },
        body: JSON.stringify({ token: token }),
      }).then(function (r) {
        return r.json().then(function (j) { return { status: r.status, body: j }; });
      }).then(function (res) {
        if (res.status === 200 && res.body && res.body.ok) { status.textContent = t("cancel_done"); return; }
        var err = res.body && res.body.error;
        status.textContent =
          err === "too_late" ? t("cancel_toolate") :
          err === "not_found" ? t("cancel_notfound") :
          err === "already_cancelled" ? t("cancel_already") :
          t("cancel_error");
      }).catch(function () { status.textContent = t("cancel_error"); });
    })();
  </script>
</body>
</html>
