<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group bookings — Re-balance</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png?v=2" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Mulish:wght@300;400;500;600;700;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css?v=117" />
  <style>
    .admin { max-width: 820px; }
    .admin__session { background: var(--cream-2); border: 1px solid var(--line); box-shadow: var(--shadow-sm); padding: 1.2rem 1.4rem; margin: 0 0 1.1rem; }
    .admin__when { font-size: 1.15rem; font-weight: 700; color: var(--ink); margin: 0 0 0.15rem; }
    .admin__seats { font-size: 0.85rem; color: var(--ink-soft); margin: 0 0 0.9rem; }
    .admin__att { border-top: 1px solid var(--line); padding: 0.6rem 0 0; margin: 0.6rem 0 0; display: grid; grid-template-columns: 1fr; gap: 0.15rem; }
    .admin__att:first-of-type { border-top: 0; margin-top: 0; padding-top: 0; }
    .admin__name { font-weight: 700; color: var(--ink); }
    .admin__contact { font-size: 0.9rem; color: var(--ink-soft); }
    .admin__contact a { color: var(--forest); }
    .admin__empty, .admin__msg { color: var(--ink-soft); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="index.html">
        <svg class="brand__icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
        <span>Re-balance</span>
      </a>
    </div>
  </header>

  <main class="section">
    <div class="wrap admin">
      <p class="eyebrow">Admin</p>
      <h1 style="margin:0 0 1.4rem">Group bookings</h1>
      <div id="admin-out"><p class="admin__msg">Loading…</p></div>
    </div>
  </main>

  <script src="assets/js/config.js?v=23"></script>
  <script>
    (function () {
      var out = document.getElementById("admin-out");
      var cfg = (window.SITE_CONFIG && window.SITE_CONFIG.booking) || {};
      var key = new URLSearchParams(location.search).get("key") || "";
      var pk = cfg.publishableKey || "";
      if (!key) { out.innerHTML = '<p class="admin__msg">Add your admin key to the URL: <code>?key=…</code></p>'; return; }
      if (!cfg.functionsBase || !pk) { out.innerHTML = '<p class="admin__msg">Booking backend not configured.</p>'; return; }

      function fmt(iso) {
        try {
          return new Intl.DateTimeFormat("en-GB", { timeZone: "Europe/Copenhagen", weekday: "long", day: "numeric", month: "long", year: "numeric", hour: "2-digit", minute: "2-digit" }).format(new Date(iso));
        } catch (e) { return iso; }
      }
      function esc(s) { return String(s == null ? "" : s).replace(/[<>&]/g, function (c) { return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]; }); }

      fetch(String(cfg.functionsBase).replace(/\/+$/, "") + "/list-bookings", {
        headers: { "apikey": pk, "Authorization": "Bearer " + pk, "x-admin-key": key },
      }).then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
        .then(function (res) {
          if (res.status === 401) { out.innerHTML = '<p class="admin__msg">Invalid admin key.</p>'; return; }
          if (res.status !== 200 || !res.body || !res.body.sessions) { out.innerHTML = '<p class="admin__msg">Could not load bookings.</p>'; return; }
          var sessions = res.body.sessions;
          if (!sessions.length) { out.innerHTML = '<p class="admin__empty">No group bookings yet.</p>'; return; }
          out.innerHTML = sessions.map(function (s) {
            var atts = s.attendees.map(function (a) {
              return '<div class="admin__att"><span class="admin__name">' + esc(a.name) + '</span>' +
                '<span class="admin__contact"><a href="mailto:' + esc(a.email) + '">' + esc(a.email) + '</a> · <a href="tel:' + esc(a.phone).replace(/[^\d+]/g, "") + '">' + esc(a.phone) + '</a></span></div>';
            }).join("");
            return '<div class="admin__session"><p class="admin__when">' + esc(fmt(s.starts_at)) + '</p>' +
              '<p class="admin__seats">' + s.attendees.length + ' of ' + s.capacity + ' seats booked</p>' + atts + '</div>';
          }).join("");
        }).catch(function () { out.innerHTML = '<p class="admin__msg">Something went wrong.</p>'; });
    })();
  </script>
</body>
</html>
